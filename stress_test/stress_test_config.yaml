
# Server Configuration
server:
  host: "localhost"
  port: 8080
  timeout: 60  # 增加超时时间

mode: "fuzz"

environment:
  endpoints_file: "~/ethpackage/endpoints.json"

# Transaction Fuzzing Configuration - 高TPS设置
tx_fuzz:
  enabled: true
  chain_id: 3151908
  max_gas_price: 50000000000  # 50 Gwei - 较高的Gas价格确保交易优先级
  max_gas_limit: 10000000     # 10M gas - 更高的Gas限制
  tx_per_second: 100          # 高TPS - 每秒100笔交易
  fuzz_duration_sec: 300      # 5分钟压力测试
  seed: 0
  use_accounts: true
  load_pattern_type: "ramp"   # 渐增模式，从低TPS逐渐增加
  # 运行时 RPC endpoints 由 endpoints.json 自动覆盖
  # 激进的重试设置
  max_retries: 5
  retry_delay: 500ms  # 更短的重试间隔
  circuit_breaker: true
  failure_threshold: 10  # 更高的失败阈值

# P2P Network Configuration
p2p:
  max_peers: 100  # 更多的对等节点
  listen_port: 30303
  jwt_secret: "0xdc49981516e8e72b401a63e6405495a32dafc3939b5d6d83cc319ac0388bca1b"
  # 运行时 bootstrap_nodes / node_names 由 endpoints.json 自动覆盖

# Fuzzing Configuration
fuzzing:
  enabled: true
  max_iterations: 5000  # 更多的迭代次数
  mutation_rate: 0.3    # 较高的变异率
  seed: 12345
  protocols:
    - "eth"
    - "snap"

# Monitoring Configuration
monitoring:
  enabled: true
  log_level: "debug"  # 详细日志用于性能分析
  metrics_port: 9090
  report_interval: 10  # 更频繁的监控报告

# Output Configuration
output:
  directory: "./output/high_tps"
  format: "json"
  compress: true

# Log Configuration
log:
  directory: "./logs/high_tps"
  template: "default"
  auto_generate: true
  include_details: true

